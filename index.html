<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgive Me?</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Admin Button (Top Right) -->
    <button id="adminBtn" class="admin-btn-top">👑 Admin</button>

    <!-- Initial Username Input Screen -->
    <div id="usernameScreen" class="screen active">
        <div class="container">
            <h1>IG User</h1>
            <input type="text" id="usernameInput" placeholder="Enter your IG username" maxlength="50">
            <button id="startBtn" class="start-btn">Start</button>
        </div>
    </div>

    <!-- Main Question Screen -->
    <div id="questionScreen" class="screen">
        <div class="container">
            <h1>Forgive me?</h1>
            <div class="buttons-container">
                <button id="yesBtn" class="btn yes-btn">Yes</button>
                <button id="noBtn" class="btn no-btn">No</button>
            </div>
            <p id="noCounter" class="counter"></p>
        </div>
    </div>

    <!-- Success Screen -->
    <div id="successScreen" class="screen">
        <div class="container">
            <h1>Thank you for forgivingg mee!! 🎉</h1>
        </div>
    </div>

    <!-- Admin Panel - Full Page Spreadsheet -->
    <div id="adminPanel" class="admin-panel-page">
        <div class="admin-header">
            <h1>Admin Panel</h1>
            <button class="close-admin">&times;</button>
        </div>

        <div class="admin-content">
            <div class="password-section">
                <input type="password" id="adminPassword" placeholder="Enter password">
                <button id="submitPasswordBtn">Submit</button>
            </div>

            <div id="adminData" style="display: none;" class="admin-data-section">
                <div class="spreadsheet-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Response</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <!-- Rows will be populated here -->
                        </tbody>
                    </table>
                </div>
                <div class="admin-stats">
                    <p><strong>Total Responses:</strong> <span id="totalCount">0</span></p>
                    <p><strong>Yes Count:</strong> <span id="yesCount">0</span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Background Elements -->
    <div class="background">
        <div class="hearts"></div>
        <div class="stars"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
