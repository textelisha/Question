<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgive Me?</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Initial Username Input Screen -->
    <div id="usernameScreen" class="screen active">
        <div class="container">
            <h1>IG User</h1>
            <input type="text" id="usernameInput" placeholder="Enter your IG username" maxlength="50">
            <button id="startBtn" class="start-btn">Start</button>
        </div>
    </div>

    <!-- Main Question Screen -->
    <div id="questionScreen" class="screen">
        <div class="container">
            <h1>Forgive me?</h1>
            <div class="buttons-container">
                <button id="yesBtn" class="btn yes-btn">Yes</button>
                <button id="noBtn" class="btn no-btn">No</button>
            </div>
            <p id="noCounter" class="counter"></p>
        </div>
    </div>

    <!-- Success Screen -->
    <div id="successScreen" class="screen">
        <div class="container">
            <h1>YAYYY U forgave mee 🎉</h1>
            <button id="adminPanelBtn" class="admin-btn">Admin Panel</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Admin Panel</h2>
            <div class="password-section">
                <input type="password" id="adminPassword" placeholder="Enter password">
                <button id="submitPasswordBtn">Submit</button>
            </div>
            <div id="adminData" style="display: none;">
                <h3>User Data</h3>
                <p><strong>Username:</strong> <span id="displayUsername"></span></p>
                <p><strong>Response:</strong> <span id="displayResponse">Yes</span></p>
            </div>
        </div>
    </div>

    <!-- Background Elements -->
    <div class="background">
        <div class="hearts"></div>
        <div class="stars"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
